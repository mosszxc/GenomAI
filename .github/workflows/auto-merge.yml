name: Auto Merge

on:
  # Когда все checks завершились
  check_suite:
    types: [completed]
  # Когда добавлен label
  pull_request:
    types: [labeled, synchronize]
  # Ручной запуск
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge'
        required: false

jobs:
  auto-merge:
    runs-on: self-hosted
    # Только для PR с label 'auto-merge' и успешными checks
    if: |
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-merge')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Auto-merge PRs with label
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Мержить только PR с этим label
          MERGE_LABELS: "auto-merge"
          # Squash merge для чистой истории
          MERGE_METHOD: "squash"
          # Использовать title PR как commit message
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          # Удалять ветку после мержа
          MERGE_DELETE_BRANCH: "true"
          # Обновить PR если отстал от main
          UPDATE_METHOD: "rebase"
