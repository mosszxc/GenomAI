name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'decision-engine-service/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'decision-engine-service/**'
      - 'tests/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: decision-engine-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run fast tests
        working-directory: decision-engine-service
        run: |
          pytest tests/unit/ -v --tb=short -m "not slow"

      - name: Test summary
        if: always()
        run: |
          echo "## Fast Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at $(date)" >> $GITHUB_STEP_SUMMARY

  slow-tests:
    name: Slow Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: decision-engine-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run slow tests
        working-directory: decision-engine-service
        run: |
          pytest tests/unit/ -v --tb=short -m "slow" || echo "No slow tests found"

      - name: Test summary
        if: always()
        run: |
          echo "## Slow Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at $(date)" >> $GITHUB_STEP_SUMMARY
