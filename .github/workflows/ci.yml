name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ruff
        run: python3 -m pip install --user ruff

      - name: Lint check
        run: python3 -m ruff check decision-engine-service/

      - name: Format check
        run: python3 -m ruff format decision-engine-service/ --check

  type-check:
    name: Type Check (mypy)
    runs-on: self-hosted
    continue-on-error: true  # Gradual adoption - не блокирует merge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mypy
        run: python3 -m pip install --user mypy types-requests

      - name: Run mypy
        working-directory: decision-engine-service
        run: |
          python3 -m mypy src/ --config-file=pyproject.toml || echo "::warning::mypy found type errors (non-blocking)"

  test:
    name: Unit Tests
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: decision-engine-service
        run: |
          python3 -m pip install --user -r requirements.txt
          python3 -m pip install --user pytest pytest-asyncio pytest-timeout

      - name: Run unit tests
        working-directory: decision-engine-service
        run: |
          python3 -m pytest tests/unit/ -v --tb=short -m "not slow" --timeout=60

  contracts:
    name: Contract Validation
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: decision-engine-service
        run: python3 -m pip install --user -r requirements.txt

      - name: Validate contracts
        run: python3 scripts/validate_contracts.py --verbose
