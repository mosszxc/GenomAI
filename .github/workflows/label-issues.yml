name: Auto-label issues for agent

on:
  issues:
    types: [opened, labeled]

jobs:
  label-for-agent:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')

    steps:
      - name: Check and label for agent
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toUpperCase();
            const labels = issue.labels.map(l => l.name);

            // Skip if already has agent-related labels
            if (labels.includes('agent-ready') ||
                labels.includes('human-only') ||
                labels.includes('agent-failed')) {
              console.log('Already has agent label, skipping');
              return;
            }

            // Skip CRITICAL and HIGH bugs - need human
            if (title.includes('[CRITICAL]') || title.includes('CRITICAL')) {
              console.log('CRITICAL bug - adding human-only');
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issue.number,
                labels: ['human-only']
              });
              return;
            }

            if (title.includes('[HIGH]')) {
              console.log('HIGH bug - adding human-only');
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issue.number,
                labels: ['human-only']
              });
              return;
            }

            // MEDIUM and lower - good for agent
            console.log('Adding agent-ready label');
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: issue.number,
              labels: ['agent-ready']
            });
