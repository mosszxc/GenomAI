name: Test n8n Workflow

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      workflow_id:
        description: 'n8n Workflow ID'
        required: true
        type: string
      issue_number:
        description: 'Issue number to comment results'
        required: false
        type: string

jobs:
  test-workflow:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null &&
      (
        (github.event.action == 'created' && contains(github.event.comment.body, '/test-workflow')) ||
        github.event_name == 'workflow_dispatch'
      )
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Extract workflow ID
        id: extract
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            WORKFLOW_ID="${{ github.event.inputs.workflow_id }}"
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          else
            # Из комментария: /test-workflow workflow-id или /test-workflow workflow-id #issue-number
            COMMENT="${{ github.event.comment.body }}"
            
            # Извлекаем workflow ID (поддерживаем разные форматы)
            # Формат 1: /test-workflow workflow-id
            # Формат 2: /test-workflow `workflow-id`
            # Формат 3: /test-workflow workflow-id #123
            WORKFLOW_ID=$(echo "$COMMENT" | sed -n 's/.*\/test-workflow[[:space:]]*`\?\([a-zA-Z0-9_-]\+\)`\?.*/\1/p' | head -1)
            
            # Если не нашли, пробуем более простой паттерн
            if [ -z "$WORKFLOW_ID" ]; then
              WORKFLOW_ID=$(echo "$COMMENT" | grep -oE '/test-workflow[[:space:]]+[a-zA-Z0-9_-]+' | awk '{print $2}' | head -1)
            fi
            
            # Извлекаем номер issue (если указан)
            ISSUE_NUMBER=$(echo "$COMMENT" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "${{ github.event.issue.number }}")
          fi
          
          if [ -z "$WORKFLOW_ID" ]; then
            echo "❌ Workflow ID не найден"
            echo ""
            echo "Использование: /test-workflow workflow-id"
            echo "Пример: /test-workflow mv6diVtqnuwr7qev"
            echo ""
            echo "Поддерживаемые форматы:"
            echo "  /test-workflow workflow-id"
            echo "  /test-workflow \`workflow-id\`"
            echo "  /test-workflow workflow-id #123"
            exit 1
          fi
          
          echo "WORKFLOW_ID=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "ISSUE_NUMBER=${ISSUE_NUMBER:-${{ github.event.issue.number }}}" >> $GITHUB_OUTPUT
          echo "✅ Workflow ID: $WORKFLOW_ID"
          echo "✅ Issue Number: ${ISSUE_NUMBER:-${{ github.event.issue.number }}}"

      - name: Test n8n Workflow
        id: test
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL || 'https://kazamaqwe.app.n8n.cloud/api/v1' }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          WORKFLOW_ID: ${{ steps.extract.outputs.WORKFLOW_ID }}
          TIMEOUT: 180000
          POLL_INTERVAL: 2000
          WAIT_FOR_MANUAL: 'true'
          VERBOSE: 'true'
        run: |
          echo "🧪 Тестирование workflow: $WORKFLOW_ID"
          echo ""
          echo "⚠️ ВНИМАНИЕ: Этот тест требует ручного запуска workflow в n8n UI"
          echo "1. Откройте workflow в n8n: https://kazamaqwe.app.n8n.cloud/workflow/$WORKFLOW_ID"
          echo "2. Нажмите на Manual Trigger node"
          echo "3. Нажмите 'Execute Node' или 'Test workflow'"
          echo "4. Скрипт автоматически обнаружит новый execution и покажет результаты"
          echo ""
          echo "⏳ Ожидание запуска workflow..."
          echo ""
          
          # Запускаем скрипт и сохраняем вывод
          OUTPUT=$(node tests/scripts/test_n8n_workflow.js "$WORKFLOW_ID" 2>&1) || EXIT_CODE=$?
          
          echo ""
          echo "📊 Результаты:"
          echo "$OUTPUT"
          
          # Сохраняем результаты
          {
            echo 'WORKFLOW_TEST_OUTPUT<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          
          echo "EXIT_CODE=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT
          
          # Если ошибка, выходим с кодом ошибки
          exit ${EXIT_CODE:-0}

      - name: Comment test results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.ISSUE_NUMBER }}');
            const workflowId = '${{ steps.extract.outputs.WORKFLOW_ID }}';
            const exitCode = '${{ steps.test.outputs.EXIT_CODE }}';
            const output = `${{ steps.test.outputs.WORKFLOW_TEST_OUTPUT }}`;
            
            const success = exitCode === '0';
            const emoji = success ? '✅' : '❌';
            const status = success ? 'успешно' : 'с ошибкой';
            const statusColor = success ? '🟢' : '🔴';
            
            // Форматируем вывод для markdown
            const formattedOutput = output
              .replace(/\[INFO\]/g, 'ℹ️')
              .replace(/\[PASS\]/g, '✅')
              .replace(/\[FAIL\]/g, '❌')
              .replace(/\[WARN\]/g, '⚠️')
              .replace(/\[DEBUG\]/g, '🔍')
              .replace(/\[HEADER\]/g, '📋');
            
            const comment = `## ${emoji} Результаты тестирования n8n Workflow
            
            ${statusColor} **Статус:** ${status}
            🔧 **Workflow ID:** \`${workflowId}\`
            🔗 **Workflow URL:** https://kazamaqwe.app.n8n.cloud/workflow/${workflowId}
            
            <details>
            <summary>📊 Детали выполнения</summary>
            
            \`\`\`
            ${formattedOutput}
            \`\`\`
            
            </details>
            
            ---
            
            💡 **Для повторного запуска:** добавьте комментарий \`/test-workflow ${workflowId}\`
            
            *Автоматически запущено через GitHub Actions*`;
            
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment
              });
            } catch (error) {
              console.error('Ошибка при создании комментария:', error);
              // Не падаем, если не удалось создать комментарий
            }

