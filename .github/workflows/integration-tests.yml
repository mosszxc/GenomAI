name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'decision-engine-service/**'
      - 'infrastructure/migrations/**'
      - 'infrastructure/contracts/**'
      - 'tests/**'

  pull_request:
    paths:
      - 'decision-engine-service/**'
      - 'infrastructure/migrations/**'
      - 'infrastructure/contracts/**'
      - 'tests/**'
      - 'docs/N8N_WORKFLOWS.md'

  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g., test_creative_pipeline)'
        required: false
        default: ''

  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

env:
  PYTHON_VERSION: '3.11'

jobs:
  contract-validation:
    name: Validate Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run contract validation
        run: python scripts/validate_contracts.py --verbose

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: contract-validation

    # Run on push/PR to main, manual trigger, or schedule (requires secrets)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DE_API_URL: ${{ secrets.DE_API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          N8N_WEBHOOK_BASE: ${{ secrets.N8N_WEBHOOK_BASE }}
        run: |
          TEST_FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$TEST_FILTER" ]; then
            pytest tests/integration/ -v -k "$TEST_FILTER" --tb=short
          else
            pytest tests/integration/ -v -m "integration and not slow" --tb=short
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            pytest-report.xml
          retention-days: 7

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dependency manifest
        run: |
          # Check manifest is valid JSON
          python -c "import json; json.load(open('infrastructure/schemas/dependency_manifest.json'))"
          echo "✓ Dependency manifest is valid JSON"

      - name: Check for orphan workflows
        run: |
          # Compare workflows in manifest vs documentation
          echo "Checking workflow consistency..."

          # Extract workflow IDs from manifest
          MANIFEST_IDS=$(python -c "
          import json
          with open('infrastructure/schemas/dependency_manifest.json') as f:
              data = json.load(f)
          for name, info in data.get('workflows', {}).items():
              print(info.get('id', ''))
          " | sort)

          echo "Workflows in manifest: $(echo "$MANIFEST_IDS" | wc -l)"
