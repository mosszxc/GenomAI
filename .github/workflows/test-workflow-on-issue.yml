name: Test n8n Workflow on Issue

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited]

jobs:
  test-workflow:
    runs-on: ubuntu-latest
    if: |
      (github.event.issue.pull_request == null) &&
      (
        (github.event.action == 'created' && contains(github.event.comment.body, '/test-workflow')) ||
        (github.event.action == 'opened' && (contains(github.event.issue.body, 'Testing & Validation') || contains(github.event.issue.body, 'test-workflow'))) ||
        (github.event.action == 'edited' && (contains(github.event.issue.body, 'Testing & Validation') || contains(github.event.issue.body, 'test-workflow')))
      )
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Extract workflow ID
        id: extract-workflow-id
        run: |
          if [ "${{ github.event.action }}" == "created" ]; then
            # Из комментария: /test-workflow workflow-id
            COMMENT="${{ github.event.comment.body }}"
            WORKFLOW_ID=$(echo "$COMMENT" | grep -oP '/test-workflow\s+\K[\w-]+' || echo "")
          else
            # Из Issue body: ищем workflow ID
            ISSUE_BODY="${{ github.event.issue.body }}"
            # Паттерны для поиска workflow ID:
            # - Workflow ID: `abc123`
            # - Workflow: `abc123`
            # - workflow-id: `abc123`
            WORKFLOW_ID=$(echo "$ISSUE_BODY" | grep -oP '(?:Workflow ID|workflow-id|Workflow):\s*`?\K[\w-]+' | head -1 || echo "")
          fi
          
          if [ -z "$WORKFLOW_ID" ]; then
            echo "WORKFLOW_ID=" >> $GITHUB_OUTPUT
            echo "FOUND=false" >> $GITHUB_OUTPUT
            echo "⚠️ Workflow ID не найден"
          else
            echo "WORKFLOW_ID=$WORKFLOW_ID" >> $GITHUB_OUTPUT
            echo "FOUND=true" >> $GITHUB_OUTPUT
            echo "✅ Найден Workflow ID: $WORKFLOW_ID"
          fi

      - name: Test n8n Workflow
        if: steps.extract-workflow-id.outputs.FOUND == 'true'
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL || 'https://kazamaqwe.app.n8n.cloud/api/v1' }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          WORKFLOW_ID: ${{ steps.extract-workflow-id.outputs.WORKFLOW_ID }}
          TIMEOUT: 120000
          POLL_INTERVAL: 1000
          WAIT_FOR_MANUAL: 'true'
          VERBOSE: 'true'
        run: |
          echo "🧪 Тестирование workflow: $WORKFLOW_ID"
          echo ""
          echo "⚠️ ВНИМАНИЕ: Этот тест требует ручного запуска workflow в n8n UI"
          echo "Запустите workflow вручную, скрипт будет ждать новый execution..."
          echo ""
          
          # Запускаем скрипт и сохраняем вывод
          OUTPUT=$(timeout 180 node tests/scripts/test_n8n_workflow.js "$WORKFLOW_ID" 2>&1) || EXIT_CODE=$?
          
          echo "$OUTPUT"
          
          # Сохраняем вывод для комментария
          echo "WORKFLOW_TEST_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "EXIT_CODE=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Comment test results
        if: always() && steps.extract-workflow-id.outputs.FOUND == 'true'
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.test-workflow.outputs.EXIT_CODE }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const workflowId = '${{ steps.extract-workflow-id.outputs.WORKFLOW_ID }}';
            const exitCode = process.env.EXIT_CODE || '0';
            const output = `${{ steps.test-workflow.outputs.WORKFLOW_TEST_OUTPUT }}`;
            
            const success = exitCode === '0';
            const emoji = success ? '✅' : '❌';
            const status = success ? 'успешно' : 'с ошибкой';
            
            // Извлекаем ключевую информацию из вывода
            let summary = '';
            if (output.includes('Execution завершился успешно')) {
              summary = '✅ Execution завершился успешно';
            } else if (output.includes('Execution завершился с ошибкой')) {
              summary = '❌ Execution завершился с ошибкой';
            } else if (output.includes('Timeout')) {
              summary = '⏱️ Timeout: новый execution не появился (нужно запустить workflow вручную)';
            } else {
              summary = '⚠️ Результат не определён';
            }
            
            const comment = `## ${emoji} Результаты тестирования n8n Workflow
            
            **Workflow ID:** \`${workflowId}\`
            **Статус:** ${status}
            
            ${summary}
            
            <details>
            <summary>Детали выполнения</summary>
            
            \`\`\`
            ${output}
            \`\`\`
            
            </details>
            
            ---
            
            *Автоматически запущено через GitHub Actions*
            *Для повторного запуска добавьте комментарий: \`/test-workflow ${workflowId}\`*
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

      - name: Comment if workflow ID not found
        if: steps.extract-workflow-id.outputs.FOUND == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            
            const comment = `## ⚠️ Workflow ID не найден
            
            Не удалось найти Workflow ID в Issue.
            
            **Как указать Workflow ID:**
            
            1. В комментарии: \`/test-workflow workflow-id\`
            2. В Issue body: \`Workflow ID: \`workflow-id\`\`
            3. В Issue body: \`workflow-id: \`workflow-id\`\`
            
            **Пример:**
            \`\`\`
            Workflow ID: \`mv6diVtqnuwr7qev\`
            \`\`\`
            
            ---
            
            *Автоматически запущено через GitHub Actions*
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

