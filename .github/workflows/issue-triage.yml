name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  add-ready-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add status:ready label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:ready']
            });
            console.log(`Added status:ready to issue #${context.issue.number}`);
