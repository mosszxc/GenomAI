default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # === PRE-COMMIT (~20s) ===

      - id: ruff-check
        name: ruff lint
        entry: python3 -m ruff check decision-engine-service/ --fix
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format check
        entry: python3 -m ruff format decision-engine-service/ --check
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: critical-tests
        name: critical tests (hashing parity)
        entry: bash -c "cd decision-engine-service && python3 -m pytest tests/unit/test_hashing.py -q --tb=no -x --timeout=30"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: mypy-check
        name: mypy type check
        entry: bash -c "cd decision-engine-service && python3 -m mypy src/ --config-file=pyproject.toml --no-error-summary 2>/dev/null || true"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
        verbose: true

      # === PRE-PUSH (~60s) ===

      - id: all-unit-tests
        name: all unit tests
        entry: bash -c "cd decision-engine-service && python3 -m pytest tests/unit/ -q --tb=short -m 'not slow' --timeout=60"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
