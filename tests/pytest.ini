[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: mark test as integration test
    slow: mark test as slow (timeout > 30s)
    requires_n8n: mark test as requiring n8n access
    requires_de: mark test as requiring Decision Engine

# Async mode
asyncio_mode = auto

# Output
addopts = -v --tb=short

# Timeout for async tests (seconds)
timeout = 120
